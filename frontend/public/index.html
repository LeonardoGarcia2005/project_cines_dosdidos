<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cines Unidos - Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Fondo cinematográfico -->
  <div class="film-bg">
    <div class="film-strip top"></div>
    <div class="film-strip bottom"></div>
    <div class="spotlight"></div>
    <div class="spotlight-2"></div>
  </div>

  <div class="login-wrapper">
    <!-- Logo -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="19" fill="url(#brandGrad)" stroke="#c00" stroke-width="1.5"/>
          <text x="20" y="27" text-anchor="middle" font-family="Arial Black" font-size="20" font-weight="900" fill="white">2</text>
          <defs>
            <radialGradient id="brandGrad" cx="35%" cy="35%">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="40%" stop-color="#f90"/>
              <stop offset="70%" stop-color="#c00"/>
              <stop offset="100%" stop-color="#006"/>
            </radialGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">CINES<span>SEPARADOS</span></span>
    </div>

    <!-- Card de login -->
    <div class="login-card">
      <div class="card-header">
        <h1>Iniciar sesión</h1>
        <p>Ingrese sus credenciales para continuar</p>
      </div>

      <div id="error-msg" class="error-msg hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <div class="form">
        <div class="field">
          <label for="username">Usuario o email</label>
          <input type="text" id="username" placeholder="Ingrese su usuario o email" autocomplete="username"/>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingrese su contraseña" autocomplete="current-password"/>
        </div>

        <div class="demo-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          <span>Demo: <strong>usuario1</strong> / <strong>123456</strong> &nbsp;|&nbsp; <strong>usuario2</strong> / <strong>123456</strong></span>
        </div>

        <button id="login-btn" class="btn-login" onclick="handleLogin()">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-loader hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </span>
        </button>
      </div>

      <div class="card-footer">
        <p>Sistema de demostración de concurrencia en PostgreSQL</p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
